<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Bench</title>
    <meta name="description" content="Make music with AI. 30 minutes. One session. Come back tomorrow.">
    <meta property="og:title" content="Sound Bench">
    <meta property="og:description" content="Make music with AI. 30 minutes. One session. Come back tomorrow.">
    <meta property="og:image" content="https://sndbnch.com/og-image.png">
    <meta property="og:url" content="https://sndbnch.com">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@vveerrgg">
    <meta name="twitter:creator" content="@vveerrgg">
    <meta name="twitter:title" content="Sound Bench">
    <meta name="twitter:description" content="Make music with AI. 30 minutes. One session. Come back tomorrow.">
    <meta name="twitter:image" content="https://sndbnch.com/og-image.png">
    <meta property="og:site_name" content="Sound Bench">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0c0a0f;
            --bg-card: #14121a;
            --text: #f0eff5;
            --text-dim: #88839a;
            --accent: #e8925a;
            --accent-dim: #a0603a;
            --border: #1e1b28;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page {
            max-width: 520px;
            padding: 60px 24px;
            text-align: center;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        h1 span { color: var(--accent); }

        .tagline {
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 48px;
        }

        .details {
            text-align: left;
            margin-bottom: 48px;
        }

        .detail {
            padding: 16px 0;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .detail:last-child {
            border-bottom: 1px solid var(--border);
        }

        .detail-label {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .detail-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
        }

        .detail-value span { color: var(--accent); }

        .bottom {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .bottom a {
            color: var(--text-dim);
            text-decoration: none;
        }

        .bottom a:hover {
            color: var(--accent);
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .page { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>Sound <span>Bench</span></h1>
        <p class="tagline">Make music with AI. 30 minutes. Come back tomorrow.</p>

        <div class="details">
            <div class="detail">
                <span class="detail-label">Sessions</span>
                <span class="detail-value"><span>30</span> minutes</span>
            </div>
            <div class="detail">
                <span class="detail-label">Cooldown</span>
                <span class="detail-value"><span>25</span> hours</span>
            </div>
            <div class="detail">
                <span class="detail-label">Artist slots</span>
                <span class="detail-value"><span>7,777</span></span>
            </div>
            <div class="detail">
                <span class="detail-label">Identity</span>
                <span class="detail-value">Nostr</span>
            </div>
            <div class="detail">
                <span class="detail-label">Derivatives</span>
                <span class="detail-value">Free</span>
            </div>
            <div class="detail">
                <span class="detail-label">User tiers</span>
                <span class="detail-value">None</span>
            </div>
        </div>

        <p class="bottom">
            A <a href="https://humanjava.com">Humanjava</a> project
        </p>
    </div>
</body>
</html>
